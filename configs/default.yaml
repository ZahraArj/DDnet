model:
  vit_arch: "vit_base_patch16_224"
  vit_pretrained: true
  fpn_out_channels: 256
  fpn_scales: [4, 8, 16, 32]
  cross_attn_heads: 8
  cross_attn_layers: 2
  depth_min: 0.1
  depth_max: 400.0
  desc_dim: 32
  ema_momentum: 0.996

training:
  stage1:
    epochs: 2 #20
    active_losses: [depth_sup, desc_sup, feat]
    lr: 1.0e-4
  stage2:
    epochs: 2 #30
    active_losses: [depth_sup, desc_sup, feat, reproj, depth_mv, desc_mv, smooth]
    lr: 5.0e-5
  stage3:
    epochs: 3 #20
    active_losses: [depth_sup, desc_sup, reproj, depth_mv, desc_mv, smooth]
    lr: 2.0e-5
  batch_size: 8
  batch_size_geo: 1        # smaller batch for stage 2/3 (geometry block is memory-heavy)
  num_workers: 0
  grad_clip: 1.0
  lambda_depth_sup: 1.0
  lambda_desc_sup:  1.0
  lambda_feat:      0.5
  lambda_reproj:    0.0001
  lambda_depth_mv:  0.0001
  lambda_desc_mv:   0.01
  lambda_smooth:    0.1
  n_corr_samples: 256
  reproj_loss_robust: "huber"

data:
  img_height: 480
  img_width:  640
  dataset_root: "/nas2/zahra/ddnet/Data/stadium_pairs/"
  train_dir:   "/nas2/zahra/ddnet/Data/stadium_pairs/"  
  val_dir:     "/nas2/zahra/ddnet/Data/stadium_pairs/"
  image_dir: "/nas2/zahra/ddnet/Data/stadium_images/"   
